services:
  - type: web
    name: merci_uqac
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: merci_uqac
          property: connectionString

databases:
  - name: merci_uqac
    plan: basic-256mb

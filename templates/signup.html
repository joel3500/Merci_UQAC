{% extends "base.html" %}

{% block content %}

    <h2>Créer un compte</h2>

    <form method="post" class="form-vertical">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" required>

      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" required>

      <label for="ville">Ville</label>
      <input type="text" id="ville" name="ville" required>

      <label for="ville">Pays</label>
      <input type="text" id="pays" name="pays" required>

      <label for="ville">Ville</label>
      <input type="text" id="ville" name="ville" required>

      <label for="etablissement_scolaire">Établissement scolaire</label>
      <input type="text" id="etablissement_scolaire" name="etablissement_scolaire">

      <label for="type">Type d'établissement</label>
      <input type="text" id="type" name="type" required>

      <label for="programme">Programme</label>
      <input type="text" id="programme" name="programme" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="mot_de_passe">Mot de passe</label>
      <input type="password" id="mot_de_passe" name="mot_de_passe" required>

      <br><br>

      <button type="submit">Créer mon compte</button>
    </form>

{% endblock %}
